# --- 基礎 ---
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# prefix 設為 Ctrl-s
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# 256 色 + true color 支援（Neovim 必備）
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
# 減少 escape 延遲（Neovim 切 mode 會更即時）
set -sg escape-time 0
set -g history-limit 50000

# window / pane index 從 1 開始（對應鍵盤 1~9）
set -g base-index 1
setw -g pane-base-index 1

# 關掉 window 後自動重新編號
set -g renumber-windows on
# 讓 tmux 用 zsh
set -g default-shell /bin/zsh

# 啟用 focus events（Neovim autoread 需要）
set -g focus-events on


# set -g pane-border-format ' #{?pane_active,#[reverse],} #{pane_index} #{pane_current_command} '
# set -g pane-border-status top
# set -g pane-base-index 1
# set -g display-panes-time 2000
# set -g mode-keys vi

# --- Status bar 頂部 tab 風格 ---
set -g status-position top
set -g status-interval 5

# Set plugin directory
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'


# -----------------------------------------------------------------------------
# 插件（透過 TPM 管理）
# -----------------------------------------------------------------------------
# 安裝 TPM:
#   git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#
# 安裝插件: prefix + I
# 更新插件: prefix + U

set -g @plugin 'tmux-plugins/tpm'
 
# --- opensessions ---
set -g @plugin 'Ataraxy-Labs/opensessions'

# --- Catppuccin 主題 ---
set -g @plugin 'catppuccin/tmux#v2.1.3' # See https://github.com/catppuccin/tmux/tags for additional tags
set -g @catppuccin_flavor "frappe"
set -g @plugin 'christoomey/vim-tmux-navigator'

# Configure the catppuccin plugin
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_flags 'icon'
set -g @catppuccin_window_default_text ' #W'
set -g @catppuccin_window_current_text ' #W'

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
# --- Session 持久化 ---
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
 
# resurrect 設定
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'    # 恢復 Neovim session
 
# continuum 設定（自動保存 + 自動恢復）
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'         # 每 15 分鐘自動保存

# -----------------------------------------------------------------------------
# 鍵盤操作
# -----------------------------------------------------------------------------
# 分割 pane（保留當前目錄）
bind | split-window
bind + split-window -v -c "#{pane_current_path}"
bind - split-window -h -c "#{pane_current_path}"
 
# 新建 window（保留當前目錄）
bind c new-window -c "#{pane_current_path}"
 
# Vim 風格切換 pane
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
 
# Vim 風格調整 pane 大小
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
 
# Copy mode 用 vi 鍵位
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# -----------------------------------------------------------------------------
# Session 管理
# -----------------------------------------------------------------------------
# prefix + f → 呼叫 tmux-sessionizer（fzf popup 選專案/session）
bind f display-popup -E -w 80% -h 70% "~/.local/bin/tmux-sessionizer"
 
# prefix + S → 互動式 session 列表（tmux 內建，可快速預覽）
bind S choose-tree -sZ
 
# prefix + X → 直接殺掉當前 session（比 :kill-session 快）
bind X confirm-before -p "kill session #S? (y/n)" kill-session
 
# prefix + R → 重新命名當前 session
bind R command-prompt -I "#S" "rename-session '%%'"
 
# -----------------------------------------------------------------------------
# 通知 — 多 session 協作的關鍵
# -----------------------------------------------------------------------------
# 其他 window 有活動或 bell 時，在 status bar 高亮提示
set -g monitor-activity on
set -g activity-action other
set -g visual-activity off
 
set -g monitor-bell on
set -g bell-action other
set -g visual-bell off
# set -g pane-active-border-style "fg=#ffa065,bg=default"
 
# --- 初始化 TPM（這行必須放最後）---
run '~/.config/tmux/plugins/tpm/tpm'

