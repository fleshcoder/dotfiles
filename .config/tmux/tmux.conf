unbind r
bind r source-file ~/.config/tmux/tmux.conf
set -g prefix C-s
set -g mouse on
set -g base-index 1
set -g renumber-windows on

set -g pane-border-format ' #{?pane_active,#[reverse],} #{pane_index} #{pane_current_command} '
set -g pane-border-status top
set -g pane-base-index 1
set -g display-panes-time 2000
set -g mode-keys vi

set-option -g status-position top


# Set plugin directory
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.3' # See https://github.com/catppuccin/tmux/tags for additional tags
set -g @plugin 'christoomey/vim-tmux-navigator'

# Configure the catppuccin plugin
set -g @catppuccin_flavor "frappe"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_status_background "#181616"
set -g @catppuccin_status_module_bg_color "#1e1f28"


# Load catppuccin
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/plugins/tpm/tpm'

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind | split-window
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

set -g pane-active-border-style "fg=#ffa065,bg=default"

